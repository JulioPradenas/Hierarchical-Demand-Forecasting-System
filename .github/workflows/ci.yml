name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Verify package installation
        run: uv run python -c "from demand_forecast.data.hierarchy import ForecastHierarchy; print('OK')"
      - name: Run checks
        run: make check
